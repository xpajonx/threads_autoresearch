name: Daily Thread Autoresearch

on:
  schedule:
    # Phase A: Feedback at 06:00 WIB (23:00 UTC previous day)
    - cron: '0 23 * * *'
    # Phase B: Generate+Publish at 07:00 WIB (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Which phase to run'
        required: true
        default: 'generate'
        type: choice
        options:
          - feedback
          - generate

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
  BUFFER_PROFILE_ID: ${{ secrets.BUFFER_PROFILE_ID }}
  BUFFER_ORG_ID: ${{ secrets.BUFFER_ORG_ID }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  THREADS_HANDLE: m.fauzan.aziz
  MAX_VARIANTS_PER_DAY: '10'
  GDRIVE_INPUT_FOLDER_ID: ${{ secrets.GDRIVE_INPUT_FOLDER_ID }}
  GDRIVE_OUTPUT_FOLDER_ID: ${{ secrets.GDRIVE_OUTPUT_FOLDER_ID }}
  APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}

jobs:
  autoresearch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv google-api-python-client google-auth-httplib2 google-auth-oauthlib apify-client "scrapling[all]>=0.4.3"
          scrapling install --force

      - name: Create credentials and token
        run: |
          echo '${{ secrets.GDRIVE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GDRIVE_TOKEN }}' > token.json

      - name: Determine phase
        id: phase
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "phase=${{ github.event.inputs.phase }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "23" ]; then
              echo "phase=feedback" >> $GITHUB_OUTPUT
            else
              echo "phase=generate" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create .tmp directory
        run: |
          mkdir -p .tmp

      - name: Phase A - Feedback
        if: steps.phase.outputs.phase == 'feedback'
        run: |
          python execution/shadow_analytics.py --feedback
        env:
          USE_DRIVE: "true" # Need update shadow_analytics to support drive if needed

      - name: Phase B - Topic Autoresearch
        if: steps.phase.outputs.phase == 'generate'
        run: |
          python execution/autoresearch_loop.py --topic-auto --use-drive
